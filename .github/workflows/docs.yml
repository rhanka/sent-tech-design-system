name: Docs

on:
  push:
    branches: ["main"]
    paths:
      - "apps/docs/**"
      - "packages/components-svelte/**"
      - "packages/themes/**"
      - "packages/tokens/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # `npm run build` already builds every workspace in dependency order,
      # docs included (its vite build emits apps/docs/build). A second explicit
      # docs build here just re-ran the whole theme prebuild — removed.
      - name: Build workspace packages (docs included)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
