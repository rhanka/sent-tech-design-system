name: Docs

on:
  push:
    branches: ["main"]
    paths:
      - "apps/docs/**"
      - "packages/components-svelte/**"
      - "packages/themes/**"
      - "packages/tokens/**"
      - "packages/skills/**"
      - "scripts/ensure-theme-dists.mjs"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Root-only node_modules cache: this avoids the huge root+workspace cache
      # previously measured as no faster than npm ci, while still skipping most
      # of the install cost for docs-only pushes.
      - name: Restore root node_modules
        id: root-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-node-modules-v1-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.root-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      # Restore previously-built theme/component dists. ensure-theme-dists (run
      # by the docs prebuild) rebuilds only packages whose source hash changed,
      # so on a docs-only change every theme is skipped and only the docs vite
      # build runs. Content-hash skip stays correct across cache restores.
      - name: Restore built dists
        uses: actions/cache@v4
        with:
          path: packages/*/dist
          key: dist-v1-${{ hashFiles('packages/*/src/**', 'packages/*/package.json', 'packages/*/*.config.*', 'packages/*/tsconfig*.json') }}
          restore-keys: |
            dist-v1-

      # Builds the docs; its prebuild (scripts/ensure-theme-dists.mjs) rebuilds
      # only the packages whose sources changed since their dist was built.
      - name: Build docs (incremental package rebuild)
        run: npm run build --workspace=@sentropic/design-system-docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
