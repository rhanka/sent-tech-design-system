name: Verify

# Consolidated verification gate for code changes, MATRIXED so the three checks
# run in parallel (wall-clock = the slowest one, not their sum). Each leg shares
# the same incremental package build (content-hash skip) + node_modules/dist
# caches, so on a warm cache only the changed packages rebuild.
#
# Publishing runs only on release tags (*-publish workflows); this gate does the
# per-package build/check/test/pack-smoke that used to run per-publish workflow.
# Path-filtered to package/build changes: docs-only changes skip this gate.

on:
  push:
    branches: ["main"]
    paths:
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/verify.yml"
  pull_request:
    paths:
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/verify.yml"
  workflow_dispatch:

jobs:
  verify:
    name: verify (${{ matrix.task }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: check
            run: node scripts/run-workspaces.mjs check
          - task: test
            run: node --test scripts/*.test.mjs && node scripts/run-workspaces.mjs test
          - task: pack-smoke
            run: node scripts/smoke-pack.mjs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore built dists
        uses: actions/cache@v4
        with:
          path: packages/*/dist
          key: dist-v1-${{ hashFiles('packages/*/src/**', 'packages/*/package.json', 'packages/*/*.config.*', 'packages/*/tsconfig*.json') }}
          restore-keys: |
            dist-v1-

      - name: Build packages (incremental, content-hash)
        run: node scripts/ensure-theme-dists.mjs

      - name: ${{ matrix.task }}
        run: ${{ matrix.run }}
