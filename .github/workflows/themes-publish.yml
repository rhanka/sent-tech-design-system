name: Themes Publish

# Publication des thèmes gouvernementaux uniquement
# (@sentropic/design-system-theme-dsfr). Les autres thèmes client/provider
# (carbon, airbus, accor, etc.) sont private:true et ne doivent pas être publiés.
# Canada/Québec ont leurs workflows dédiés canada-publish.yml/quebec-publish.yml.
# Déclenchée par un tag `themes-v<version>` pour le thème DSFR.
#
# Publication via npm Trusted Publishing (OIDC) : trusted publisher
# (rhanka/sent-tech-design-system + themes-publish.yml, permission npm publish)
# configuré sur npm — aucun token requis, provenance SLSA automatique.

on:
  push:
    tags: ["themes-v*"]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build DSFR theme (dep order)
        run: |
          npm --workspace @sentropic/design-system-tokens run build
          npm --workspace @sentropic/design-system-themes run build
          npm --workspace @sentropic/design-system-theme-dsfr run build
      - name: Smoke — compiled CSS non vide
        run: |
          node --input-type=module -e "
          import { compileThemeStyleTag } from '@sentropic/design-system-themes';
          import { dsfrTheme } from '@sentropic/design-system-theme-dsfr';
          const css = compileThemeStyleTag(dsfrTheme);
          if (!css || css.length < 1000) { console.error('CSS trop court pour dsfr'); process.exit(1); }
          console.log('dsfr -> ' + css.length + ' octets CSS');
          "

  release-guard:
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/themes-v')
    env:
      RELEASE_BRANCH: ${{ github.event.repository.default_branch }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is merged into default branch
        run: |
          git fetch origin "${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/${RELEASE_BRANCH}"; then
            echo "::error::Refusing to publish ${TAG}: ${GITHUB_SHA} is not merged into origin/${RELEASE_BRANCH}."
            exit 1
          fi
      - name: Verify DSFR theme version matches tag
        run: |
          EXPECTED="${TAG#themes-v}"
          ACTUAL=$(node -p "require('./packages/theme-dsfr/package.json').version")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Tag ${TAG} expects ${EXPECTED} but packages/theme-dsfr is ${ACTUAL}."
            exit 1
          fi
          echo "DSFR theme version matches ${EXPECTED}"

  publish:
    needs: release-guard
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/themes-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm
        run: npm install -g npm@11.6.2
      - name: Install and build
        run: |
          npm ci
          npm --workspace @sentropic/design-system-tokens run build
          npm --workspace @sentropic/design-system-themes run build
          npm --workspace @sentropic/design-system-theme-dsfr run build
      - name: Publish theme-dsfr
        run: npm publish --workspace @sentropic/design-system-theme-dsfr --access public

  post-publish-check:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/themes-v')
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Wait for npm propagation
        run: |
          VERSION="${TAG#themes-v}"
          PKG="@sentropic/design-system-theme-dsfr"
          ok=""
          for attempt in {1..20}; do
            if npm view "${PKG}@${VERSION}" version --silent > /dev/null 2>&1; then
              echo "${PKG}@${VERSION} is available from npm."
              ok=1; break
            fi
            echo "Waiting for ${PKG} propagation, attempt ${attempt}/20..."
            sleep 15
          done
          if [ -z "$ok" ]; then echo "::error::Timed out waiting for ${PKG}."; exit 1; fi
