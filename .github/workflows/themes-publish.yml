name: Themes Publish

# Publication des thèmes de mapping DS tiers → Sentropic
# (@sentropic/design-system-theme-dsfr et -theme-carbon), sur leur propre ligne
# de version, indépendante des packages DS coeur et du moteur skills.
# Déclenchée par un tag `themes-v<version>` (les deux packages sont versionnés
# en lockstep, comme tokens/themes/svelte).
#
# Publication via npm Trusted Publishing (OIDC) : trusted publisher
# (rhanka/sent-tech-design-system + themes-publish.yml, permission npm publish)
# configuré sur npm pour CHAQUE package — aucun token requis, provenance SLSA
# automatique. npm autorise la pré-configuration d'un trusted publisher avant
# le tout premier publish d'un package neuf.

on:
  push:
    branches: ["main"]
    tags: ["themes-v*"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build themes (dep order)
        run: |
          npm --workspace @sentropic/design-system-tokens run build
          npm --workspace @sentropic/design-system-themes run build
          npm --workspace @sentropic/design-system-theme-dsfr run build
          npm --workspace @sentropic/design-system-theme-carbon run build
      - name: Smoke — compiled CSS non vide
        run: |
          node --input-type=module -e "
          import { compileThemeStyleTag } from '@sentropic/design-system-themes';
          import { dsfrTheme } from '@sentropic/design-system-theme-dsfr';
          import { carbonTheme } from '@sentropic/design-system-theme-carbon';
          for (const [id, t] of [['dsfr', dsfrTheme], ['carbon', carbonTheme]]) {
            const css = compileThemeStyleTag(t);
            if (!css || css.length < 1000) { console.error('CSS trop court pour ' + id); process.exit(1); }
            console.log(id + ' -> ' + css.length + ' octets CSS');
          }"

  release-guard:
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/themes-v')
    env:
      RELEASE_BRANCH: ${{ github.event.repository.default_branch }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is merged into default branch
        run: |
          git fetch origin "${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/${RELEASE_BRANCH}"; then
            echo "::error::Refusing to publish ${TAG}: ${GITHUB_SHA} is not merged into origin/${RELEASE_BRANCH}."
            exit 1
          fi
      - name: Verify both theme versions match tag
        run: |
          EXPECTED="${TAG#themes-v}"
          for pkg in theme-dsfr theme-carbon; do
            ACTUAL=$(node -p "require('./packages/${pkg}/package.json').version")
            if [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "::error::Tag ${TAG} expects ${EXPECTED} but packages/${pkg} is ${ACTUAL}."
              exit 1
            fi
          done
          echo "both theme versions match ${EXPECTED}"

  publish:
    needs: release-guard
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/themes-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm
        run: npm install -g npm@11.6.2
      - name: Install and build
        run: |
          npm ci
          npm --workspace @sentropic/design-system-tokens run build
          npm --workspace @sentropic/design-system-themes run build
          npm --workspace @sentropic/design-system-theme-dsfr run build
          npm --workspace @sentropic/design-system-theme-carbon run build
      # BOOTSTRAP (premier publish de packages neufs) : token granulaire scope
      # @sentropic, le temps que le trusted publisher OIDC soit configuré pour
      # chacun des deux packages. À RETIRER ensuite (retour OIDC pur).
      - name: Publish theme-dsfr
        run: npm publish --workspace @sentropic/design-system-theme-dsfr --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish theme-carbon
        run: npm publish --workspace @sentropic/design-system-theme-carbon --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  post-publish-check:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/themes-v')
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Wait for npm propagation
        run: |
          VERSION="${TAG#themes-v}"
          for pkg in @sentropic/design-system-theme-dsfr @sentropic/design-system-theme-carbon; do
            ok=""
            for attempt in {1..20}; do
              if npm view "${pkg}@${VERSION}" version --silent > /dev/null 2>&1; then
                echo "${pkg}@${VERSION} is available from npm."
                ok=1; break
              fi
              echo "Waiting for ${pkg} propagation, attempt ${attempt}/20..."
              sleep 15
            done
            if [ -z "$ok" ]; then echo "::error::Timed out waiting for ${pkg}."; exit 1; fi
          done
