name: NPM Publish

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify

      - name: Smoke packed packages
        run: npm run pack:smoke

  release-guard:
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      RELEASE_BRANCH: ${{ github.event.repository.default_branch }}
      TAG_VERSION: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is merged into default branch
        run: |
          git fetch origin "${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/${RELEASE_BRANCH}"; then
            echo "::error::Refusing to publish ${GITHUB_REF_NAME}: ${GITHUB_SHA} is not merged into origin/${RELEASE_BRANCH}."
            exit 1
          fi

      - name: Verify package versions match tag
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: |
          EXPECTED_VERSION="${EXPECTED_VERSION#v}"
          EXPECTED_VERSION="$EXPECTED_VERSION" node --input-type=module <<'NODE'
          import { readdirSync, readFileSync } from "node:fs";
          import { join } from "node:path";

          const expected = process.env.EXPECTED_VERSION;
          const packagesDir = "packages";
          const failures = [];

          for (const entry of readdirSync(packagesDir, { withFileTypes: true })) {
            if (!entry.isDirectory()) continue;

            const manifestPath = join(packagesDir, entry.name, "package.json");
            const manifest = JSON.parse(readFileSync(manifestPath, "utf8"));
            if (manifest.version !== expected) {
              failures.push(`${manifest.name}: ${manifest.version}`);
            }
          }

          if (failures.length > 0) {
            console.error(`Tag version ${expected} does not match package versions:`);
            for (const failure of failures) console.error(`- ${failure}`);
            process.exit(1);
          }

          console.log(`All package versions match ${expected}`);
          NODE

  publish:
    needs: release-guard
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for Trusted Publishing
        run: |
          npm install -g npm@11.6.2
          node --version
          npm --version

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Publish packages
        run: |
          npm publish --workspace @sentropic/design-system-tokens --access public
          npm publish --workspace @sentropic/design-system-themes --access public
          npm publish --workspace @sentropic/design-system-svelte --access public

  post-publish-check:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      TAG_VERSION: ${{ github.ref_name }}

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Wait for npm propagation
        run: |
          VERSION="${TAG_VERSION#v}"
          PACKAGES=(
            "@sentropic/design-system-tokens"
            "@sentropic/design-system-themes"
            "@sentropic/design-system-svelte"
          )

          for attempt in {1..20}; do
            missing=()

            for package in "${PACKAGES[@]}"; do
              if ! npm view "${package}@${VERSION}" version --silent > /dev/null 2>&1; then
                missing+=("${package}@${VERSION}")
              fi
            done

            if [ "${#missing[@]}" -eq 0 ]; then
              echo "All packages are available from npm."
              exit 0
            fi

            echo "Waiting for npm propagation, attempt ${attempt}/20: ${missing[*]}"
            sleep 15
          done

          echo "::error::Timed out waiting for npm propagation."
          exit 1

      - name: Install published packages
        run: |
          VERSION="${TAG_VERSION#v}"
          mkdir /tmp/sent-tech-post-publish
          cd /tmp/sent-tech-post-publish
          npm init -y --silent
          npm install \
            "@sentropic/design-system-tokens@${VERSION}" \
            "@sentropic/design-system-themes@${VERSION}" \
            "@sentropic/design-system-svelte@${VERSION}" \
            "svelte@^5.53.2"

      - name: Verify published package imports
        run: |
          cd /tmp/sent-tech-post-publish
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const tokens = await import("@sentropic/design-system-tokens");
          const themes = await import("@sentropic/design-system-themes");

          if (typeof tokens.flattenTokens !== "function") {
            throw new Error("@sentropic/design-system-tokens missing flattenTokens export");
          }

          if (typeof themes.compileTheme !== "function") {
            throw new Error("@sentropic/design-system-themes missing compileTheme export");
          }

          const componentsEntry = await import.meta.resolve("@sentropic/design-system-svelte");
          const componentIndex = readFileSync(new URL(componentsEntry), "utf8");

          for (const exportName of ["Button", "Card", "Input", "Textarea"]) {
            if (!componentIndex.includes("as " + exportName)) {
              throw new Error("@sentropic/design-system-svelte missing " + exportName + " export");
            }
          }

          console.log("Published package imports verified");
          NODE
