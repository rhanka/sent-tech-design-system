name: Airbus Theme Publish

# Publication du thème client Airbus (@sentropic/design-system-theme-airbus),
# sur sa propre ligne de version. Déclenchée par un tag `airbus-v<version>`.
#
# Publication via npm Trusted Publishing (OIDC). Le trusted publisher attendu
# côté npm est : rhanka/sent-tech-design-system + airbus-publish.yml.
# (À configurer sur npmjs.com pour @sentropic/design-system-theme-airbus.)

on:
  push:
    branches: ["main"]
    tags: ["airbus-v*"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build Airbus theme dependencies
        run: |
          npm --workspace @sentropic/design-system-tokens run build
          npm --workspace @sentropic/design-system-themes run build
      - name: Verify Airbus theme package
        run: |
          npm --workspace @sentropic/design-system-theme-airbus run build
          npm --workspace @sentropic/design-system-theme-airbus test
      - name: Smoke packed packages
        run: npm run pack:smoke

  release-guard:
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/airbus-v')
    env:
      RELEASE_BRANCH: ${{ github.event.repository.default_branch }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is merged into default branch
        run: |
          git fetch origin "${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/${RELEASE_BRANCH}"; then
            echo "::error::Refusing to publish ${TAG}: ${GITHUB_SHA} is not merged into origin/${RELEASE_BRANCH}."
            exit 1
          fi
      - name: Verify Airbus theme version matches tag
        run: |
          EXPECTED="${TAG#airbus-v}"
          ACTUAL=$(node -p "require('./packages/theme-airbus/package.json').version")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Tag ${TAG} expects ${EXPECTED} but packages/theme-airbus is ${ACTUAL}."
            exit 1
          fi
          echo "Airbus theme version matches ${EXPECTED}"

  publish:
    needs: release-guard
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/airbus-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm
        run: npm install -g npm@11.6.2
      - name: Install and build
        run: |
          npm ci
          npm --workspace @sentropic/design-system-tokens run build
          npm --workspace @sentropic/design-system-themes run build
          npm --workspace @sentropic/design-system-theme-airbus run build
      - name: Publish Airbus theme package
        run: npm publish --workspace @sentropic/design-system-theme-airbus --access public

  post-publish-check:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/airbus-v')
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Wait for npm propagation
        run: |
          VERSION="${TAG#airbus-v}"
          for attempt in {1..20}; do
            if npm view "@sentropic/design-system-theme-airbus@${VERSION}" version --silent > /dev/null 2>&1; then
              echo "@sentropic/design-system-theme-airbus@${VERSION} is available from npm."
              exit 0
            fi
            echo "Waiting for npm propagation, attempt ${attempt}/20..."
            sleep 15
          done
          echo "::error::Timed out waiting for npm propagation."
          exit 1
