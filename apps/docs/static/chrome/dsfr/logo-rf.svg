<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="72" height="72" role="img" aria-label="Drapeau de la République Française">
  <title>République Française</title>
  <!--
    Bloc-marque DSFR : drapeau tricolore seul, propre.
    Le texte « RÉPUBLIQUE FRANÇAISE » + titre du service sont rendus en HTML
    à côté de cette image (cf. ChromeDsfr.svelte / chrome-spec.json).
    Couleurs officielles : Bleu France #000091, Blanc, Rouge Marianne #e1000f.
  -->
  <rect x="0" y="0" width="24" height="72" fill="#000091"/>
  <rect x="24" y="0" width="24" height="72" fill="#ffffff"/>
  <rect x="48" y="0" width="24" height="72" fill="#e1000f"/>
  <!-- Filet discret pour détacher la bande blanche du fond blanc du header -->
  <rect x="0.5" y="0.5" width="71" height="71" fill="none" stroke="#dddddd" stroke-width="1"/>
</svg>
