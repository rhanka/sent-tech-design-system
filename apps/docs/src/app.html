<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sent Tech Design System</title>
    <meta name="description" content="Documentation du design system Sent Tech: composants Svelte, tokens et themes tenant." />
    <link rel="icon" href="/SENT-logo-squared.svg" type="image/svg+xml" />

    <!--
      Polices de marque chargées GLOBALEMENT (toutes les pages docs, tous les
      thèmes). Le thème Carbon déclare `--st-font-sans: 'IBM Plex Sans', …` et le
      thème DSFR `Marianne, …` ; sans ces déclarations de polices, chaque page
      retombait sur une police système (les polices n'étaient chargées que sur
      /compare). On charge UNIQUEMENT les polices, jamais le reset global de
      dsfr.min.css/carbon-components.css.
      - IBM Plex Sans (Carbon) : Google Fonts.
      - Marianne (DSFR) : @font-face servis par le CDN DSFR (URLs absolues).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap"
    />
    <style>
      /* Marianne (DSFR) — @font-face servis par le CDN DSFR, sans le reset DSFR. */
      @font-face {
        font-display: swap;
        font-family: Marianne;
        font-style: normal;
        font-weight: 400;
        src:
          url("https://cdn.jsdelivr.net/npm/@gouvfr/dsfr/dist/fonts/Marianne-Regular.woff2") format("woff2"),
          url("https://cdn.jsdelivr.net/npm/@gouvfr/dsfr/dist/fonts/Marianne-Regular.woff") format("woff");
      }
      @font-face {
        font-display: swap;
        font-family: Marianne;
        font-style: italic;
        font-weight: 400;
        src:
          url("https://cdn.jsdelivr.net/npm/@gouvfr/dsfr/dist/fonts/Marianne-Regular_Italic.woff2") format("woff2"),
          url("https://cdn.jsdelivr.net/npm/@gouvfr/dsfr/dist/fonts/Marianne-Regular_Italic.woff") format("woff");
      }
      @font-face {
        font-display: swap;
        font-family: Marianne;
        font-style: normal;
        font-weight: 500;
        src:
          url("https://cdn.jsdelivr.net/npm/@gouvfr/dsfr/dist/fonts/Marianne-Medium.woff2") format("woff2"),
          url("https://cdn.jsdelivr.net/npm/@gouvfr/dsfr/dist/fonts/Marianne-Medium.woff") format("woff");
      }
      @font-face {
        font-display: swap;
        font-family: Marianne;
        font-style: normal;
        font-weight: 700;
        src:
          url("https://cdn.jsdelivr.net/npm/@gouvfr/dsfr/dist/fonts/Marianne-Bold.woff2") format("woff2"),
          url("https://cdn.jsdelivr.net/npm/@gouvfr/dsfr/dist/fonts/Marianne-Bold.woff") format("woff");
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!--
      Script anti-FOUC : restaure data-color-mode + data-st-theme + data-st-framework
      sur <html> AVANT que le navigateur ne peigne la page, pour éviter un flash
      (blanc→sombre, ou thème par défaut→thème choisi) au chargement initial.
      Lit les MÊMES clés localStorage que les stores (color-mode.svelte.ts,
      +layout.svelte THEME_STORAGE_KEY, framework.svelte.ts). Exécuté en
      bloquant-rendu (pas defer/async) intentionnellement.
    -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("st-docs-color-mode");
          if (mode === "dark" || mode === "light") {
            document.documentElement.setAttribute("data-color-mode", mode);
          }
          // Thème : data-st-theme pilote le chrome + les variables :root du thème.
          var theme = localStorage.getItem("st-docs-theme");
          if (theme === "sent-tech" || theme === "dsfr" || theme === "carbon" || theme === "airbus" || theme === "canada") {
            document.documentElement.setAttribute("data-st-theme", theme);
          }
          // Framework : data-st-framework pilote l'affichage des îles svelte/react/vue.
          var fw = localStorage.getItem("docs-framework");
          if (fw === "svelte" || fw === "react" || fw === "vue") {
            document.documentElement.setAttribute("data-st-framework", fw);
          }
          // ── URL = source de vérité ────────────────────────────────────────
          // Au TOUT PREMIER chargement (URL sans param), on AMORCE l'URL depuis
          // localStorage AVANT l'hydratation SvelteKit. Ainsi page.url porte déjà
          // ?theme/?framework et le chrome est choisi de façon DÉTERMINISTE
          // (plus de course d'hydratation : SSR rend le chrome par défaut, mais
          // le client lit le même page.url que celui réécrit ici). Si un param
          // est DÉJÀ présent dans l'URL (deep-link/partage), il fait foi : on n'y
          // touche pas. localStorage ne sert qu'à cette amorce.
          var params = new URLSearchParams(location.search);
          var changed = false;
          if (!params.has("theme") && theme && theme !== "sent-tech") {
            params.set("theme", theme); changed = true;
          }
          if (!params.has("framework") && fw && fw !== "svelte") {
            params.set("framework", fw); changed = true;
          }
          if (changed) {
            var qs = params.toString();
            history.replaceState(history.state, "", location.pathname + (qs ? "?" + qs : "") + location.hash);
          }
        } catch (e) { /* accès localStorage impossible (iframe, SSR, etc.) */ }
      })();
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
